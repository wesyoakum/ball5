<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team — Ball5</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="site-nav">
        <img src="Ball5 Logo.png" alt="Ball5" class="site-nav-logo">
        <div class="site-nav-links">
            <a href="index.html">Scorebook</a>
            <a href="teams.html" class="active">Teams</a>
            <a href="stats.html">Stats</a>
        </div>
        <span class="version-tag">v709612e</span>
    </nav>

    <div class="page-container">
        <div style="margin-bottom:8px;">
            <a href="teams.html" style="font-size:0.8rem; color:var(--ink-light); text-decoration:none;">&larr; All Teams</a>
        </div>

        <input type="text" class="team-name-editable" id="team-name" placeholder="Team Name">

        <div class="team-columns">
            <!-- Left: Roster -->
            <div class="team-col-roster">
                <h2 class="team-section-title">Roster</h2>
                <table class="roster-table" id="roster-table">
                    <thead>
                        <tr>
                            <th class="col-num">#</th>
                            <th class="col-fname">First</th>
                            <th class="col-lname">Last</th>
                            <th class="col-action"></th>
                        </tr>
                    </thead>
                    <tbody id="roster-body"></tbody>
                </table>
                <button class="btn-add-row" id="btn-add-roster">+ Add Player</button>
                <p class="roster-hint">Click a player to add to lineup. Drag to reorder lineup.</p>
            </div>

            <!-- Right: Lineup Card -->
            <div class="team-col-lineup">
                <h2 class="team-section-title">Line-Up</h2>
                <div class="lineup-card">
                    <div class="lineup-card-header">
                        <span class="lineup-card-hdr-order"></span>
                        <span class="lineup-card-hdr-num">#</span>
                        <span class="lineup-card-hdr-name">Player</span>
                        <span class="lineup-card-hdr-pos">Pos</span>
                        <span class="lineup-card-hdr-action"></span>
                    </div>
                    <div class="lineup-builder" id="lineup-builder"></div>
                </div>
                <div class="lineup-actions">
                    <button class="btn-save-lineup" id="btn-save-lineup">Save Lineup</button>
                    <button class="btn-use-lineup" id="btn-use-away">Use as Visitors</button>
                    <button class="btn-use-lineup" id="btn-use-home">Use as Home</button>
                </div>
            </div>
        </div>

        <!-- Saved Lineups (full width below) -->
        <h2 class="team-section-title">Saved Lineups</h2>
        <div class="saved-lineups-list" id="saved-lineups"></div>

        <div style="margin-top:20px; border-top:1px solid var(--grid-line-light); padding-top:12px;">
            <button class="btn-secondary" id="btn-delete-team">Delete Team</button>
        </div>
    </div>

    <script src="storage.js"></script>
    <script>
    (async function() {
        'use strict';

        const $ = (sel) => document.querySelector(sel);
        const params = new URLSearchParams(window.location.search);
        const teamId = params.get('id');

        if (!teamId) {
            window.location.href = 'teams.html';
            return;
        }

        await Storage.open();
        let team = await Storage.get('teams', teamId);

        if (!team) {
            window.location.href = 'teams.html';
            return;
        }

        // Ensure data shape
        if (!team.roster) team.roster = [];
        if (!team.lineups) team.lineups = [];
        if (!team.players) team.players = [];

        // Migrate roster: if roster entries have 'name' but no 'firstName', split them
        for (const p of team.roster) {
            if (p.name && !p.firstName) {
                const parts = p.name.trim().split(/\s+/);
                p.firstName = parts[0] || '';
                p.lastName = parts.slice(1).join(' ') || '';
            }
            if (!p.firstName) p.firstName = '';
            if (!p.lastName) p.lastName = '';
            if (!p.positions) p.positions = [];
        }

        // If roster is empty but players exist, seed roster from players
        if (team.roster.length === 0 && team.players.length > 0) {
            team.roster = team.players
                .filter(p => p.name && p.name.trim())
                .map(p => {
                    const parts = (p.name || '').trim().split(/\s+/);
                    return {
                        firstName: parts[0] || '', lastName: parts.slice(1).join(' ') || '',
                        name: p.name, number: p.number || '', positions: p.position ? [p.position] : []
                    };
                });
        }

        // Helper: display name from roster entry
        function rosterDisplayName(p) {
            return (p.firstName || '') + (p.lastName ? ' ' + p.lastName : '');
        }

        // Lineup state (working lineup, not yet saved)
        let lineup = team.players.length > 0
            ? team.players.map(p => ({ name: p.name || '', number: p.number || '', position: p.position || '' }))
            : [];

        const teamNameInput = $('#team-name');
        teamNameInput.value = team.name || '';
        document.title = (team.name || 'Team') + ' — Ball5';

        teamNameInput.addEventListener('change', () => {
            team.name = teamNameInput.value;
            document.title = (team.name || 'Team') + ' — Ball5';
            save();
        });

        async function save() {
            team.updatedAt = new Date().toISOString();
            // Keep roster name field in sync with firstName/lastName
            for (const p of team.roster) {
                p.name = rosterDisplayName(p);
            }
            // Keep players in sync with current lineup
            team.players = lineup.map(p => ({ name: p.name, number: p.number, position: p.position }));
            await Storage.put('teams', teamId, team);
        }

        // ---- Roster (no position column) ----
        function renderRoster() {
            const tbody = $('#roster-body');
            tbody.innerHTML = '';
            for (let i = 0; i < team.roster.length; i++) {
                const p = team.roster[i];
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="col-num"><input type="text" value="${p.number || ''}" placeholder="#" maxlength="3" data-idx="${i}" data-field="number"></td>
                    <td class="col-fname"><input type="text" value="${p.firstName || ''}" placeholder="First" data-idx="${i}" data-field="firstName"></td>
                    <td class="col-lname"><input type="text" value="${p.lastName || ''}" placeholder="Last" data-idx="${i}" data-field="lastName"></td>
                    <td class="col-action"><button class="btn-remove-row" data-idx="${i}">&times;</button></td>
                `;
                tbody.appendChild(tr);
            }

            // Event delegation
            tbody.onchange = (e) => {
                const input = e.target;
                if (!input.dataset.idx) return;
                const idx = parseInt(input.dataset.idx);
                const field = input.dataset.field;
                if (field === 'number') {
                    team.roster[idx].number = input.value;
                } else if (field === 'firstName') {
                    team.roster[idx].firstName = input.value;
                    team.roster[idx].name = rosterDisplayName(team.roster[idx]);
                } else if (field === 'lastName') {
                    team.roster[idx].lastName = input.value;
                    team.roster[idx].name = rosterDisplayName(team.roster[idx]);
                }
                save();
                renderLineup();
            };

            tbody.onclick = (e) => {
                const btn = e.target.closest('.btn-remove-row');
                if (btn) {
                    const idx = parseInt(btn.dataset.idx);
                    team.roster.splice(idx, 1);
                    save();
                    renderRoster();
                    renderLineup();
                    return;
                }
                // Click row to add player to lineup (if not clicking an input)
                if (e.target.tagName === 'INPUT') return;
                const tr = e.target.closest('tr');
                if (!tr) return;
                const idx = parseInt(tr.querySelector('input')?.dataset.idx);
                if (isNaN(idx)) return;
                const rp = team.roster[idx];
                if (!rp || !rp.name) return;
                // Don't add if already in lineup
                const lineupNames = new Set(lineup.filter(p => p.name).map(p => p.name));
                if (lineupNames.has(rp.name)) return;
                addPlayerToLineup(rp);
            };
        }

        $('#btn-add-roster').addEventListener('click', () => {
            team.roster.push({ firstName: '', lastName: '', name: '', number: '', positions: [] });
            save();
            renderRoster();
            renderLineup();
            // Focus the new name input
            const inputs = document.querySelectorAll('#roster-body input[data-field="firstName"]');
            if (inputs.length) inputs[inputs.length - 1].focus();
        });

        // ---- Lineup Builder (Drag & Drop) ----
        let dragSrcIdx = null;

        function addPlayerToLineup(rosterPlayer) {
            const rp = rosterPlayer;
            lineup.push({
                name: rp.name,
                number: rp.number || '',
                position: rp.positions && rp.positions.length === 1 ? rp.positions[0] : ''
            });
            renderLineup();
            renderRoster(); // update dimming
        }

        function renderLineup() {
            const container = $('#lineup-builder');
            container.innerHTML = '';

            // Dim roster rows for players already in lineup
            const lineupNames = new Set(lineup.filter(p => p.name).map(p => p.name));
            document.querySelectorAll('#roster-body tr').forEach(tr => {
                const nameInput = tr.querySelector('input[data-field="firstName"]');
                const lastInput = tr.querySelector('input[data-field="lastName"]');
                if (nameInput && lastInput) {
                    const fullName = (nameInput.value + ' ' + lastInput.value).trim();
                    tr.classList.toggle('in-lineup', lineupNames.has(fullName));
                }
            });

            // Lineup slots
            for (let i = 0; i < lineup.length; i++) {
                const slot = document.createElement('div');
                slot.className = 'lineup-slot';
                slot.draggable = true;
                slot.dataset.idx = i;

                // Drag to reorder
                slot.addEventListener('dragstart', (e) => {
                    dragSrcIdx = i;
                    e.dataTransfer.effectAllowed = 'move';
                    slot.classList.add('dragging');
                });
                slot.addEventListener('dragend', () => {
                    slot.classList.remove('dragging');
                    container.querySelectorAll('.lineup-slot').forEach(s => s.classList.remove('drag-over'));
                });
                slot.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    slot.classList.add('drag-over');
                });
                slot.addEventListener('dragleave', () => {
                    slot.classList.remove('drag-over');
                });
                slot.addEventListener('drop', (e) => {
                    e.preventDefault();
                    slot.classList.remove('drag-over');
                    if (dragSrcIdx !== null && dragSrcIdx !== i) {
                        const moved = lineup.splice(dragSrcIdx, 1)[0];
                        lineup.splice(i, 0, moved);
                        renderLineup();
                    }
                });

                const order = document.createElement('span');
                order.className = 'lineup-slot-order';
                order.textContent = i + 1;

                // Show # from roster
                const numSpan = document.createElement('span');
                numSpan.className = 'lineup-slot-num';
                numSpan.textContent = lineup[i].number || '';

                // Show first name (or full name if no firstName in roster)
                const rp = team.roster.find(r => r.name === lineup[i].name);
                const displayName = rp ? (rp.firstName || rp.name) : (lineup[i].name || '');

                const nameSpan = document.createElement('span');
                nameSpan.className = 'lineup-slot-name';
                nameSpan.textContent = displayName || '(empty)';
                if (!displayName) nameSpan.style.color = 'var(--grid-line-light)';

                const posInput = document.createElement('input');
                posInput.className = 'lineup-slot-pos';
                posInput.type = 'text';
                posInput.value = lineup[i].position || '';
                posInput.placeholder = 'Pos';
                posInput.maxLength = 3;
                posInput.addEventListener('change', () => {
                    lineup[i].position = posInput.value.toUpperCase();
                    posInput.value = posInput.value.toUpperCase();
                });

                const removeBtn = document.createElement('button');
                removeBtn.className = 'btn-remove-row';
                removeBtn.textContent = '\u00d7';
                removeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    lineup.splice(i, 1);
                    renderLineup();
                });

                slot.appendChild(order);
                slot.appendChild(numSpan);
                slot.appendChild(nameSpan);
                slot.appendChild(posInput);
                slot.appendChild(removeBtn);
                container.appendChild(slot);
            }

        }

        // ---- Save Lineup ----
        $('#btn-save-lineup').addEventListener('click', async () => {
            const name = prompt('Lineup name:', 'Lineup ' + (team.lineups.length + 1));
            if (!name) return;
            team.lineups.push({
                name,
                date: new Date().toISOString().slice(0, 10),
                players: lineup.map(p => ({ ...p }))
            });
            await save();
            renderSavedLineups();
        });

        // ---- Use in Current Game ----
        async function useLineup(side) {
            let currentGame = await Storage.get('currentGame', 'current');
            // If no current game, create one
            if (!currentGame) {
                currentGame = {
                    id: 'game-' + Date.now(),
                    date: new Date().toISOString().slice(0, 10),
                    status: 'in-progress',
                    createdAt: new Date().toISOString(),
                    completedAt: null,
                    innings: 9,
                    awayTeam: { teamId: null, name: '', players: [], pitchers: [{ name: '', startInning: 1, endInning: null }], currentPitcherIdx: 0 },
                    homeTeam: { teamId: null, name: '', players: [], pitchers: [{ name: '', startInning: 1, endInning: null }], currentPitcherIdx: 0 },
                    atBats: {}
                };
            }
            const teamData = side === 'away' ? currentGame.awayTeam : currentGame.homeTeam;
            teamData.teamId = teamId;
            teamData.name = team.name;
            teamData.players = lineup.map(p => ({ name: p.name, number: p.number, position: p.position }));
            await Storage.put('currentGame', 'current', currentGame);
            window.location.href = 'index.html';
        }

        $('#btn-use-away').addEventListener('click', () => useLineup('away'));
        $('#btn-use-home').addEventListener('click', () => useLineup('home'));

        // ---- Delete Team ----
        $('#btn-delete-team').addEventListener('click', async () => {
            if (!confirm('Delete this team permanently?')) return;
            await Storage.del('teams', teamId);
            window.location.href = 'teams.html';
        });

        // ---- Saved Lineups (show full lineup card) ----
        function renderSavedLineups() {
            const container = $('#saved-lineups');
            if (team.lineups.length === 0) {
                container.innerHTML = '<p class="stats-empty" style="padding:16px 0;">No saved lineups yet.</p>';
                return;
            }
            container.innerHTML = '';
            for (let i = 0; i < team.lineups.length; i++) {
                const lu = team.lineups[i];
                const card = document.createElement('div');
                card.className = 'saved-lineup-card';

                // Header with name, date, actions
                const header = document.createElement('div');
                header.className = 'saved-lineup-card-header';
                header.innerHTML = `
                    <div>
                        <span class="saved-lineup-card-name">${lu.name}</span>
                        <span class="saved-lineup-card-date">${lu.date}</span>
                    </div>
                    <div class="saved-lineup-card-actions">
                        <button data-action="load" data-idx="${i}">Load</button>
                        <button data-action="delete" data-idx="${i}">Delete</button>
                    </div>
                `;
                card.appendChild(header);

                // Full lineup card table
                const table = document.createElement('div');
                table.className = 'saved-lineup-table';
                const hdr = document.createElement('div');
                hdr.className = 'lineup-card-header';
                hdr.innerHTML = `
                    <span class="lineup-card-hdr-order"></span>
                    <span class="lineup-card-hdr-num">#</span>
                    <span class="lineup-card-hdr-name">Player</span>
                    <span class="lineup-card-hdr-pos">Pos</span>
                `;
                table.appendChild(hdr);

                for (let j = 0; j < lu.players.length; j++) {
                    const p = lu.players[j];
                    if (!p.name) continue;
                    const rp = team.roster.find(r => r.name === p.name);
                    const displayName = rp ? (rp.firstName || rp.name) : (p.name || '');
                    const row = document.createElement('div');
                    row.className = 'lineup-slot saved-lineup-row';
                    row.innerHTML = `
                        <span class="lineup-slot-order">${j + 1}</span>
                        <span class="lineup-slot-num">${p.number || ''}</span>
                        <span class="lineup-slot-name">${displayName}</span>
                        <span class="lineup-slot-pos-display">${p.position || ''}</span>
                    `;
                    table.appendChild(row);
                }
                card.appendChild(table);
                container.appendChild(card);
            }

            container.onclick = async (e) => {
                const btn = e.target.closest('button');
                if (!btn) return;
                const idx = parseInt(btn.dataset.idx);
                if (btn.dataset.action === 'load') {
                    lineup = team.lineups[idx].players.map(p => ({ ...p }));
                    renderLineup();
                } else if (btn.dataset.action === 'delete') {
                    team.lineups.splice(idx, 1);
                    await save();
                    renderSavedLineups();
                }
            };
        }

        // ---- Initial Render ----
        renderRoster();
        renderLineup();
        renderSavedLineups();

        if (Storage.cloudEnabled()) {
            Storage.pullFromCloud().then(async (updated) => {
                if (updated) {
                    team = await Storage.get('teams', teamId);
                    if (!team.roster) team.roster = [];
                    if (!team.lineups) team.lineups = [];
                    renderRoster();
                    renderLineup();
                    renderSavedLineups();
                }
            });
        }
    })();
    </script>
</body>
</html>
