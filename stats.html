<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Season Statistics — Ball5</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="site-nav">
        <img src="Ball5 Logo.png" alt="Ball5" class="site-nav-logo">
        <div class="site-nav-links">
            <a href="index.html">Scorebook</a>
            <a href="teams.html">Teams</a>
            <a href="stats.html" class="active">Stats</a>
        </div>
        <span class="version-tag" id="version-tag"></span>
    </nav>
    <script src="version.js"></script>
    <script>document.getElementById('version-tag').textContent = 'v' + APP_VERSION;</script>

    <div class="page-container">
        <div class="stats-page-filters">
            <select id="stats-team-filter" class="stats-filter-select">
                <option value="">All Teams</option>
            </select>
            <input type="date" id="stats-date-from" class="stats-filter-date" title="From date">
            <input type="date" id="stats-date-to" class="stats-filter-date" title="To date">
            <button id="stats-refresh" class="stats-refresh-btn">Refresh</button>
        </div>
        <div class="stats-page-tabs">
            <button class="stats-page-tab active" data-tab="batting">Batting</button>
            <button class="stats-page-tab" data-tab="pitching">Pitching</button>
            <button class="stats-page-tab" data-tab="standings">Standings</button>
        </div>
        <div class="stats-table-container" id="stats-table-container">
            <p class="stats-empty">Loading...</p>
        </div>
    </div>

    <script src="storage.js"></script>
    <script src="scoring.js"></script>
    <script src="stats.js"></script>
    <script>
    (async function() {
        'use strict';

        const $ = (sel) => document.querySelector(sel);
        const $$ = (sel) => document.querySelectorAll(sel);
        let currentTab = 'batting';

        await Storage.open();

        // Tab switching
        $$('.stats-page-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                currentTab = tab.dataset.tab;
                $$('.stats-page-tab').forEach(t => t.classList.toggle('active', t === tab));
                refresh();
            });
        });

        $('#stats-refresh').addEventListener('click', refresh);

        async function refresh() {
            const container = $('#stats-table-container');
            const allGames = await Storage.getAll('games');
            const games = allGames.map(g => g.value);

            // Include current in-progress game
            const current = await Storage.get('currentGame', 'current');
            if (current && current.atBats && Object.keys(current.atBats).length > 0 && current.status !== 'completed') {
                games.push(current);
            }

            if (games.length === 0) {
                container.innerHTML = '<p class="stats-empty">No games recorded yet.</p>';
                return;
            }

            // Populate team filter
            const teamFilter = $('#stats-team-filter');
            const currentVal = teamFilter.value;
            const teamNames = Stats.getAllTeamNames(games);
            teamFilter.innerHTML = '<option value="">All Teams</option>';
            for (const t of teamNames) {
                const opt = document.createElement('option');
                opt.value = t;
                opt.textContent = t;
                if (t === currentVal) opt.selected = true;
                teamFilter.appendChild(opt);
            }

            const filters = {};
            if (teamFilter.value) filters.teamName = teamFilter.value;
            const dateFrom = $('#stats-date-from').value;
            const dateTo = $('#stats-date-to').value;
            if (dateFrom) filters.dateFrom = dateFrom;
            if (dateTo) filters.dateTo = dateTo;

            if (currentTab === 'batting') renderBatting(container, games, filters);
            else if (currentTab === 'pitching') renderPitching(container, games, filters);
            else if (currentTab === 'standings') renderStandings(container, games, filters);
        }

        function renderBatting(container, games, filters) {
            const players = Stats.getAllPlayers(games, filters);
            if (players.length === 0) { container.innerHTML = '<p class="stats-empty">No batting data.</p>'; return; }

            const rows = players.map(p => ({
                ...Stats.calcSeasonBatting(games, p.name, filters),
                name: p.name, teams: p.teams.join(', ')
            })).filter(r => r.g > 0).sort((a, b) => b.avg - a.avg || b.h - a.h);

            let html = `<table class="stats-table"><thead><tr>
                <th>Player</th><th>Team</th><th>G</th><th>AB</th><th>R</th><th>H</th>
                <th>2B</th><th>3B</th><th>HR</th><th>RBI</th><th>BB</th><th>SO</th>
                <th>SB</th><th>AVG</th><th>OBP</th><th>SLG</th><th>OPS</th>
            </tr></thead><tbody>`;
            for (const r of rows) {
                html += `<tr>
                    <td class="stats-name">${r.name}</td><td>${r.teams}</td>
                    <td>${r.g}</td><td>${r.ab}</td><td>${r.r}</td><td>${r.h}</td>
                    <td>${r['2b']}</td><td>${r['3b']}</td><td>${r.hr}</td><td>${r.rbi}</td>
                    <td>${r.bb}</td><td>${r.so}</td><td>${r.sb}</td>
                    <td>${Stats.fmtAvg(r.avg)}</td><td>${Stats.fmtAvg(r.obp)}</td>
                    <td>${Stats.fmtAvg(r.slg)}</td><td>${Stats.fmtAvg(r.ops)}</td>
                </tr>`;
            }
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function renderPitching(container, games, filters) {
            const pitchers = Stats.getAllPitchers(games, filters);
            if (pitchers.length === 0) { container.innerHTML = '<p class="stats-empty">No pitching data.</p>'; return; }

            const rows = pitchers.map(p => ({
                ...Stats.calcSeasonPitching(games, p.name, filters),
                name: p.name, teams: p.teams.join(', ')
            })).filter(r => r.g > 0).sort((a, b) => a.era - b.era);

            let html = `<table class="stats-table"><thead><tr>
                <th>Pitcher</th><th>Team</th><th>G</th><th>IP</th><th>H</th>
                <th>R</th><th>ER</th><th>BB</th><th>SO</th><th>HR</th>
                <th>Pitches</th><th>Strikes</th><th>ERA</th><th>WHIP</th>
            </tr></thead><tbody>`;
            for (const r of rows) {
                html += `<tr>
                    <td class="stats-name">${r.name}</td><td>${r.teams}</td>
                    <td>${r.g}</td><td>${r.ip}</td><td>${r.h}</td>
                    <td>${r.r}</td><td>${r.er}</td><td>${r.bb}</td><td>${r.so}</td><td>${r.hr}</td>
                    <td>${r.totalPitches}</td><td>${r.strikes}</td>
                    <td>${Stats.fmtEra(r.era)}</td><td>${r.whip.toFixed(2)}</td>
                </tr>`;
            }
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function renderStandings(container, games, filters) {
            const standings = Stats.calcTeamStandings(games, filters);
            if (standings.length === 0) { container.innerHTML = '<p class="stats-empty">No completed games.</p>'; return; }

            let html = `<table class="stats-table"><thead><tr>
                <th>Team</th><th>G</th><th>W</th><th>L</th><th>T</th>
                <th>PCT</th><th>RS</th><th>RA</th><th>DIFF</th>
            </tr></thead><tbody>`;
            for (const t of standings) {
                const pct = t.g > 0 ? (t.w / t.g) : 0;
                const diff = t.rs - t.ra;
                html += `<tr>
                    <td class="stats-name">${t.name}</td>
                    <td>${t.g}</td><td>${t.w}</td><td>${t.l}</td><td>${t.t}</td>
                    <td>${Stats.fmtAvg(pct)}</td><td>${t.rs}</td><td>${t.ra}</td>
                    <td class="${diff > 0 ? 'stats-positive' : diff < 0 ? 'stats-negative' : ''}">${diff > 0 ? '+' : ''}${diff}</td>
                </tr>`;
            }
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // Initial load
        await refresh();

        // Cloud sync in background
        if (Storage.cloudEnabled()) {
            Storage.pullFromCloud().then(updated => { if (updated) refresh(); });
        }
    })();
    </script>
</body>
</html>
