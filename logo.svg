<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 70" width="200" height="70">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Pacifico&amp;display=swap');
    </style>
  </defs>
  <!-- "Ball" in script font -->
  <text x="5" y="52" font-family="'Pacifico', 'Brush Script MT', cursive" font-size="50" fill="#7a1a2a" stroke="#fff" stroke-width="2" paint-order="stroke">Ball</text>
  <!-- "5" in bold block -->
  <rect x="130" y="8" width="52" height="52" rx="4" fill="#7a1a2a"/>
  <rect x="132" y="10" width="48" height="48" rx="3" fill="none" stroke="#fff" stroke-width="2"/>
  <text x="156" y="50" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="42" font-weight="800" fill="#fff">5</text>
</svg>
